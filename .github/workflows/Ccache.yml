name: OrangeFox Recovery Builder laaau

# ─────────────────────────────────────────────────────────────────────────────
#  Builds boot image first, then vendor_boot image reusing all compiled objects.
#  ccache is stored as split chunks in a dedicated git repo (adithyann14/ccahe).
#  NUKE_CACHE=true skips restore and overwrites the cache repo after the build.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      SYNC_URL:
        description: 'SYNC_URL'
        required: true
        default: 'https://gitlab.com/OrangeFox/sync.git'
      MANIFEST_BRANCH:
        description: 'MANIFEST_BRANCH'
        required: true
        default: '12.1'
      DEVICE_TREE_URL:
        description: 'DEVICE_TREE_URL'
        required: true
        default: 'https://github.com/adithy4n/recovery_device_xiaomi_pipa'
      DEVICE_TREE_BRANCH:
        description: 'DEVICE_TREE_BRANCH'
        required: true
        default: 'A-12.1'
      DEVICE_PATH:
        description: 'DEVICE_PATH'
        required: true
        default: 'device/xiaomi/pipa'
      COMMON_TREE_URL:
        description: 'COMMON_TREE_URL (leave blank if none)'
        required: false
      COMMON_PATH:
        description: 'COMMON_PATH (leave blank if none)'
        required: false
      DEVICE_NAME:
        description: 'DEVICE_NAME'
        required: true
        default: 'pipa'
      MAKEFILE_NAME:
        description: 'MAKEFILE_NAME'
        required: true
        default: 'twrp_pipa'
      BUILD_TARGET:
        description: 'BUILD_TARGET (first build — vendor_boot always follows)'
        required: true
        default: 'boot'
      NUKE_CACHE:
        description: 'NUKE_CACHE — skip restore and overwrite cache with a fresh one'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    env:
      CCACHE_DIR: ${{ github.workspace }}/../.ccache
      USE_CCACHE: '1'
      CCACHE_EXEC: /usr/bin/ccache

    steps:

    # ── 1. Checkout this repo ────────────────────────────────────────────────
    - name: Check Out
      uses: actions/checkout@v4

    # ── 2. Free disk space ───────────────────────────────────────────────────
    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main

    # ── 3. Create workspace folder ───────────────────────────────────────────
    - name: Initialize workspace
      id: pwd
      run: |
        mkdir workspace
        cd workspace
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT

    # ── 4. Restore ccache from cache repo ────────────────────────────────────
    #
    #  Skipped entirely when NUKE_CACHE=true. The save step at the end will
    #  overwrite the repo with a brand-new cache.
    #
    - name: Restore ccache from cache repo
      if: github.event.inputs.NUKE_CACHE != 'true'
      continue-on-error: true
      run: |
        CACHE_REPO="https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/adithyann14/ccahe.git"
        echo "Cloning cache repo (shallow)…"
        if git clone --depth=1 "$CACHE_REPO" /tmp/ccache_repo 2>/dev/null; then
          CHUNKS=$(ls /tmp/ccache_repo/ccache_chunk_* 2>/dev/null | wc -l)
          if [ "$CHUNKS" -gt 0 ]; then
            echo "Found $CHUNKS chunk(s) — reassembling ccache archive…"
            cat /tmp/ccache_repo/ccache_chunk_* > /tmp/ccache.tar.gz
            mkdir -p "$HOME/.ccache"
            tar -xzf /tmp/ccache.tar.gz -C "$HOME"
            rm -f /tmp/ccache.tar.gz
            echo "✅ ccache restored ($(du -sh "$HOME/.ccache" | cut -f1))"
          else
            echo "ℹ️  Cache repo has no chunks — cold start"
          fi
          rm -rf /tmp/ccache_repo
        else
          echo "ℹ️  Cache repo not reachable — cold start"
        fi

    # ── 5. Build environment ─────────────────────────────────────────────────
    - name: Prepare the build environment
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      run: |
        sudo apt-get update -qq && sudo apt-get upgrade -y -qq
        # linux-modules-extra may not exist for every runner kernel — ignore failure
        sudo apt-get install -y linux-modules-extra-$(uname -r) || true
        DEBIAN_FRONTEND=noninteractive sudo apt-get install -yq \
            git python3 tar aria2 ccache
        git clone https://gitlab.com/OrangeFox/misc/scripts
        cd scripts
        sudo bash setup/android_build_env.sh
        sed -i 's/cd -/cd ../g' setup/install_android_sdk.sh
        sudo bash setup/install_android_sdk.sh

    # ── 6. Configure ccache ──────────────────────────────────────────────────
    - name: Configure ccache
      run: |
        ccache --max-size=5G
        ccache --set-config=compression=true
        ccache --set-config=compression_level=5
        ccache -z   # reset stats — summary will reflect this run only
        echo "CCACHE_DIR=$HOME/.ccache"    >> $GITHUB_ENV
        echo "USE_CCACHE=1"                >> $GITHUB_ENV
        echo "CCACHE_EXEC=$(which ccache)" >> $GITHUB_ENV

    # ── 7. Java ──────────────────────────────────────────────────────────────
    - name: Install OpenJDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    # ── 8. SSH (only when git@ URLs are used) ────────────────────────────────
    - name: Setup SSH Keys
      if: |
        startsWith(github.event.inputs.DEVICE_TREE_URL, 'git@github.com') ||
        startsWith(github.event.inputs.COMMON_TREE_URL,  'git@github.com')
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    # ── 9. Sync OrangeFox manifest ───────────────────────────────────────────
    - name: Sync OrangeFox sources
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      run: |
        git clone ${{ github.event.inputs.SYNC_URL }}
        cd sync
        ./orangefox_sync.sh \
          --branch ${{ github.event.inputs.MANIFEST_BRANCH }} \
          --path   ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}

    # ── 10. Clone device tree ────────────────────────────────────────────────
    - name: Clone device tree
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      run: |
        cd fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        git clone ${{ github.event.inputs.DEVICE_TREE_URL }} \
          -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} \
          ./${{ github.event.inputs.DEVICE_PATH }}

    # ── 11. Clone common tree (optional) ─────────────────────────────────────
    - name: Clone common tree
      if: >
        github.event.inputs.COMMON_TREE_URL != '' &&
        github.event.inputs.COMMON_PATH     != ''
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      run: |
        cd fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        git clone ${{ github.event.inputs.COMMON_TREE_URL }} \
          -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} \
          ./${{ github.event.inputs.COMMON_PATH }}

    # ── 12. Swap space ───────────────────────────────────────────────────────
    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    # ── 13. BUILD — boot image ───────────────────────────────────────────────
    #
    #  Standard recovery-as-boot build. make clean runs here and only here.
    #  FOX_VENDOR_BOOT_RECOVERY is intentionally NOT set for this step.
    #
    - name: Build boot image
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      run: |
        cd fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        set +e; source build/envsetup.sh; set -e
        export ALLOW_MISSING_DEPENDENCIES=true
        export USE_CCACHE=1
        export CCACHE_EXEC=$(which ccache)
        lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng
        make clean
        mka adbd ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc --all)

    # ── 14. BUILD — vendor_boot image ────────────────────────────────────────
    #
    #  Reuses every compiled object from step 13 — Ninja only reruns ramdisk
    #  assembly and image-packaging (~2–5 min). No make clean here by design.
    #  FOX_VENDOR_BOOT_RECOVERY must be exported BEFORE source/lunch so that
    #  vendorsetup.sh picks up the "vBaR" variant during lunch evaluation.
    #
    - name: Build vendor_boot image
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      run: |
        cd fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        export FOX_VENDOR_BOOT_RECOVERY=1   # set BEFORE source so vendorsetup.sh sees it
        set +e; source build/envsetup.sh; set -e
        export ALLOW_MISSING_DEPENDENCIES=true
        export USE_CCACHE=1
        export CCACHE_EXEC=$(which ccache)
        lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng
        # intentionally NO make clean — all objects from step 13 are reused
        mka adbd vendorbootimage -j$(nproc --all)

    # ── 15. ccache stats ─────────────────────────────────────────────────────
    - name: ccache statistics
      if: always()
      run: ccache -s

    # ── 16. Save ccache to cache repo ────────────────────────────────────────
    #
    #  Runs even on build failure to preserve partial compilation work.
    #  When NUKE_CACHE=true this still runs — it just saves a fresh cache
    #  (the old one was never restored, so this naturally replaces it).
    #  Force-push keeps the repo at a single commit — no history bloat.
    #
    - name: Save ccache to cache repo
      if: always()
      continue-on-error: true
      run: |
        echo "Compressing ~/.ccache …"
        tar -czf /tmp/ccache.tar.gz -C "$HOME" .ccache
        echo "Compressed size: $(du -sh /tmp/ccache.tar.gz | cut -f1)"

        CACHE_REPO="https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/adithyann14/ccahe.git"

        if ! git clone --depth=1 "$CACHE_REPO" /tmp/ccache_save 2>/dev/null; then
          mkdir -p /tmp/ccache_save && cd /tmp/ccache_save
          git init
          git remote add origin "$CACHE_REPO"
        fi

        cd /tmp/ccache_save
        rm -f ccache_chunk_*
        split -b 90M /tmp/ccache.tar.gz ccache_chunk_
        rm -f /tmp/ccache.tar.gz

        CHUNKS=$(ls ccache_chunk_* | wc -l)
        echo "Split into $CHUNKS × 90 MB chunks"

        git config user.email "github-actions@github.com"
        git config user.name  "GitHub Actions"
        git add ccache_chunk_*

        NUKE_FLAG="${{ github.event.inputs.NUKE_CACHE }}"
        [ "$NUKE_FLAG" = "true" ] && NUKE_NOTE=" [NUKED+REBUILT]" || NUKE_NOTE=""
        MSG="ccache: $(date '+%Y-%m-%d %H:%M UTC') | run #${{ github.run_id }} | $CHUNKS chunks$NUKE_NOTE"
        git commit -m "$MSG" || echo "Nothing to commit"

        git push --force "$CACHE_REPO" HEAD:main 2>/dev/null   || \
        git push --force "$CACHE_REPO" HEAD:master             || \
        echo "⚠️  Push failed — cache not saved this run"

    # ── 17. List output directory ────────────────────────────────────────────
    - name: Check output directory
      if: always()
      continue-on-error: true
      run: |
        echo "=== product root ==="
        ls -al ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/
        echo ""
        echo "=== device output ==="
        ls -al ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/

    # ── 18. Upload to Release ────────────────────────────────────────────────
    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.img
          ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.zip
        name: ${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          Manifest  : ${{ github.event.inputs.MANIFEST_BRANCH }}
          Device    : ${{ github.event.inputs.DEVICE_NAME }}
          Targets   : ${{ github.event.inputs.BUILD_TARGET }} + vendor_boot
          Cache     : ${{ github.event.inputs.NUKE_CACHE == 'true' && 'NUKED (fresh)' || 'restored from cache repo' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
